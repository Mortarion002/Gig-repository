version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gig_postgres
    restart: always
    environment:
      POSTGRES_USER: gig_admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: gig_db
    ports:
      - "5433:5432"
    volumes:
      - gig_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gig_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - gig_redis_data:/data

volumes:
  gig_pg_data:
  gig_redis_data: